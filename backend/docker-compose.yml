services:
  db:
    image: postgres:16-alpine
    container_name: foresight_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-foresight_db}
      POSTGRES_USER: ${DB_USER:-foresight_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-foresight_dev_password}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - foresight_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-foresight_user} -d ${DB_NAME:-foresight_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  foresight_pgdata:
